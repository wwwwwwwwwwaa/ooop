version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ooop_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ooop_db
      MYSQL_USER: ooop_user
      MYSQL_PASSWORD: ooop_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ooop_network

  fastapi:
    build: .
    container_name: ooop_fastapi
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://ooop_user:ooop_password@mysql:3306/ooop_db
    depends_on:
      - mysql
    networks:
      - ooop_network
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:

networks:
  ooop_network:
    driver: bridge
